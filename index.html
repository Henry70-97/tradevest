<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BestPay - Registration & Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs, query, where, serverTimestamp, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDtGN7KCK0A4fhztLN0CgxsKkGROcO_-vI",
            authDomain: "bestpay-5b78c.firebaseapp.com",
            projectId: "bestpay-5b78c",
            storageBucket: "bestpay-5b78c.firebasestorage.app",
            messagingSenderId: "583230068716",
            appId: "1:583230068716:web:3e8d298b4d00b46c8652c9"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        function generateReferralCode() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }
        
        // Check auth state and redirect if already logged in
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const role = userDoc.data().role;
                    if (role === "admin") {
                        window.location.href = "admin-html";
                    } else {
                        window.location.href = "dashboard-html";
                    }
                }
            }
        });
        
        // Tab switching
        window.showTab = function(tab) {
            document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
            document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
            document.getElementById('loginTab').classList.toggle('border-b-2', tab === 'login');
            document.getElementById('loginTab').classList.toggle('border-blue-600', tab === 'login');
            document.getElementById('loginTab').classList.toggle('text-blue-600', tab === 'login');
            document.getElementById('registerTab').classList.toggle('border-b-2', tab === 'register');
            document.getElementById('registerTab').classList.toggle('border-blue-600', tab === 'register');
            document.getElementById('registerTab').classList.toggle('text-blue-600', tab === 'register');
        };
        
        // Login
        window.handleLogin = async function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const messageEl = document.getElementById('loginMessage');
            
            if (!email || !password) {
                messageEl.innerText = 'Please fill all fields';
                return;
            }
            
            try {
                messageEl.innerText = 'Logging in...';
                const userCred = await signInWithEmailAndPassword(auth, email, password);
                const userDoc = await getDoc(doc(db, "users", userCred.user.uid));
                
                if (userDoc.exists()) {
                    const role = userDoc.data().role;
                    if (role === "admin") {
                        window.location.href = "admin-html";
                    } else {
                        window.location.href = "dashboard-html";
                    }
                } else {
                    messageEl.innerText = 'User data not found';
                }
            } catch (error) {
                messageEl.innerText = error.message;
            }
        };
        
        // Register
        window.handleRegister = async function() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const referralCode = document.getElementById('regReferral').value;
            const messageEl = document.getElementById('registerMessage');
            
            if (!name || !email || !password) {
                messageEl.innerText = 'Please fill all required fields';
                return;
            }
            
            if (password.length < 6) {
                messageEl.innerText = 'Password must be at least 6 characters';
                return;
            }
            
            try {
                messageEl.innerText = 'Creating account...';
                
                // Check if first user
                const usersSnapshot = await getDocs(collection(db, "users"));
                const isFirstUser = usersSnapshot.empty;
                const role = isFirstUser ? "admin" : "user";
                
                // Create auth user
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                const uid = userCred.user.uid;
                
                // Update profile
                await updateProfile(userCred.user, { displayName: name });
                
                // Create user document
                const newReferralCode = generateReferralCode();
                await setDoc(doc(db, "users", uid), {
                    email: email,
                    displayName: name,
                    createdAt: serverTimestamp(),
                    referralCode: newReferralCode,
                    referredBy: referralCode || null,
                    kycStatus: "unverified",
                    isSuspended: false,
                    isFrozen: false,
                    role: role,
                    totalEarned: 20,
                    withdrawableBalance: 20,
                    totalWithdrawn: 0
                });
                
                // Create wallet
                await setDoc(doc(db, "wallets", uid), {
                    investedBalance: 0,
                    bonusBalance: 20,
                    totalDeposited: 0,
                    lastUpdated: serverTimestamp()
                });
                
                // Create login streak
                await setDoc(doc(db, "login_streaks", uid), {
                    currentStreak: 1,
                    longestStreak: 1,
                    lastLoginDate: new Date().toISOString().split('T')[0],
                    bonusClaimedToday: true
                });
                
                // Handle referral
                if (referralCode) {
                    const q = query(collection(db, "users"), where("referralCode", "==", referralCode));
                    const qSnap = await getDocs(q);
                    if (!qSnap.empty) {
                        await addDoc(collection(db, "referrals"), {
                            referrerId: qSnap.docs[0].id,
                            referredId: uid,
                            commissionEarned: 0,
                            status: "pending",
                            commissionRate: 10,
                            createdAt: serverTimestamp()
                        });
                    }
                }
                
                messageEl.style.color = "green";
                messageEl.innerText = 'Registration successful! Redirecting...';
                
                setTimeout(() => {
                    if (role === "admin") {
                        window.location.href = "admin-html";
                    } else {
                        window.location.href = "dashboard-html";
                    }
                }, 1500);
                
            } catch (error) {
                messageEl.style.color = "red";
                messageEl.innerText = error.message;
            }
        };
        
        // Enter key handlers
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (!document.getElementById('loginForm').classList.contains('hidden')) {
                    handleLogin();
                } else if (!document.getElementById('registerForm').classList.contains('hidden')) {
                    handleRegister();
                }
            }
        });
    </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-900 to-purple-800">
    <div class="container mx-auto px-4 py-12">
        <div class="max-w-md mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden">
            <div class="bg-gradient-to-r from-blue-600 to-purple-600 p-6 text-center">
                <i class="fas fa-coins text-5xl text-yellow-300 mb-2"></i>
                <h1 class="text-3xl font-bold text-white">BestPay</h1>
                <p class="text-blue-100 mt-1">Earn • Invest • Grow</p>
            </div>
            
            <div class="p-8">
                <div class="flex gap-2 mb-6">
                    <button id="loginTab" onclick="showTab('login')" class="flex-1 py-2 font-semibold border-b-2 border-blue-600 text-blue-600 transition">
                        <i class="fas fa-sign-in-alt mr-2"></i>Login
                    </button>
                    <button id="registerTab" onclick="showTab('register')" class="flex-1 py-2 font-semibold text-gray-500 hover:text-gray-700 transition">
                        <i class="fas fa-user-plus mr-2"></i>Register
                    </button>
                </div>
                
                <!-- Login Form -->
                <div id="loginForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                        <input type="email" id="loginEmail" placeholder="you@example.com" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200">
                        <i class="fas fa-sign-in-alt mr-2"></i>Login
                    </button>
                    <p id="loginMessage" class="text-sm text-red-500 text-center"></p>
                </div>
                
                <!-- Register Form -->
                <div id="registerForm" class="hidden space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                        <input type="text" id="regName" placeholder="John Doe" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                        <input type="email" id="regEmail" placeholder="you@example.com" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="regPassword" placeholder="Minimum 6 characters" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Referral Code (Optional)</label>
                        <input type="text" id="regReferral" placeholder="Enter referral code" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <button onclick="handleRegister()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200">
                        <i class="fas fa-user-plus mr-2"></i>Create Account
                    </button>
                    <p id="registerMessage" class="text-sm text-red-500 text-center"></p>
                </div>
                
                <div class="mt-6 pt-4 border-t text-center text-xs text-gray-500">
                    <p>By continuing, you agree to our Terms of Service and Privacy Policy</p>
                    <p class="mt-1">💰 First user becomes Admin automatically</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
