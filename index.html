        // ---------- Registration Logic with Terms validation ----------
        async function handleRegister() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const referralCode = document.getElementById('regReferral').value.trim();
            const termsOk = document.getElementById('termsCheckbox').checked;
            const msgEl = document.getElementById('regMessage');
            
            if (!name || !email || !password) {
                msgEl.innerText = '❌ Please fill all required fields.';
                return;
            }
            if (password.length < 6) {
                msgEl.innerText = '❌ Password must be at least 6 characters.';
                return;
            }
            if (!termsOk) {
                msgEl.innerText = '❌ You must accept the Terms & Conditions (20 clauses) to register.';
                return;
            }
            msgEl.innerText = '⏳ Creating account...';
            msgEl.style.color = '#2563eb';
            
            try {
                // Check first user (admin detection)
                const usersSnapshot = await getDocs(collection(db, "users"));
                const isFirstUser = usersSnapshot.empty;
                const role = isFirstUser ? "admin" : "user";
                
                // Create auth user
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                const uid = userCred.user.uid;
                await updateProfile(userCred.user, { displayName: name });
                
                const newReferralCode = generateReferralCode();
                // Create user document
                await setDoc(doc(db, "users", uid), {
                    email: email,
                    displayName: name,
                    createdAt: serverTimestamp(),
                    referralCode: newReferralCode,
                    referredBy: referralCode || null,
                    kycStatus: "unverified",
                    isSuspended: false,
                    isFrozen: false,
                    role: role,
                    totalEarned: 20,
                    withdrawableBalance: 20,
                    totalWithdrawn: 0
                });
                // Wallet doc
                await setDoc(doc(db, "wallets", uid), {
                    investedBalance: 0,
                    bonusBalance: 20,
                    totalDeposited: 0,
                    lastUpdated: serverTimestamp()
                });
                // Login streak init
                await setDoc(doc(db, "login_streaks", uid), {
                    currentStreak: 1,
                    longestStreak: 1,
                    lastLoginDate: new Date().toISOString().split('T')[0],
                    bonusClaimedToday: true
                });
                // Referral tracking
                if (referralCode) {
                    const q = query(collection(db, "users"), where("referralCode", "==", referralCode));
                    const qSnap = await getDocs(q);
                    if (!qSnap.empty) {
                        await addDoc(collection(db, "referrals"), {
                            referrerId: qSnap.docs[0].id,
                            referredId: uid,
                            commissionEarned: 0,
                            status: "pending",
                            commissionRate: 10,
                            createdAt: serverTimestamp()
                        });
                    }
                }
                msgEl.innerText = '✅ Registration successful! Redirecting to dashboard...';
                msgEl.style.color = 'green';
                // Auth state will trigger rerender (dashboard/admin)
            } catch (error) {
                msgEl.style.color = 'red';
                msgEl.innerText = `⚠️ ${error.message}`;
            }
        }
        
        // Login Handler
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const msgEl = document.getElementById('loginMessage');
            if (!email || !password) {
                msgEl.innerText = 'Please enter email and password';
                return;
            }
            msgEl.innerText = 'Signing in...';
            try {
                const userCred = await signInWithEmailAndPassword(auth, email, password);
                // Auth state changed will render appropriate view
                msgEl.innerText = 'Success! Redirecting...';
                msgEl.style.color = 'green';
            } catch (err) {
                msgEl.innerText = err.message;
                msgEl.style.color = 'red';
            }
        }

        // ---------- Main Auth State Handler (no broken redirects, dynamic rendering) ----------
        async function initAuthState() {
            onAuthStateChanged(auth, async (firebaseUser) => {
                if (!firebaseUser) {
                    // No user -> show landing + auth
                    renderLandingAndAuth();
                    return;
                }
                // User is signed in -> fetch role from firestore
                try {
                    const userDocRef = doc(db, "users", firebaseUser.uid);
                    const userDocSnap = await getDoc(userDocRef);
                    if (!userDocSnap.exists()) {
                        // Edge: doc missing -> signout
                        await signOut(auth);
                        renderLandingAndAuth();
                        return;
                    }
                    const role = userDocSnap.data().role;
                    if (role === "admin") {
                        await renderAdminDashboard(firebaseUser, userDocSnap);
                    } else {
                        await renderUserDashboard(firebaseUser, userDocSnap);
                    }
                } catch (err) {
                    console.error(err);
                    renderLandingAndAuth();
                }
            });
        }
        
        // start the application
        initAuthState();
    </script>
</head>
