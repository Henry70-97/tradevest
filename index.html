<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BestPay – Earn, Invest, Grow</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, getDocs, query, where, serverTimestamp, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "bestpay-5b78c.firebaseapp.com",
    projectId: "bestpay-5b78c",
    storageBucket: "bestpay-5b78c.appspot.com",
    messagingSenderId: "583230068716",
    appId: "1:583230068716:web:3e8d298b4d00b46c8652c9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Redirect if already logged in
onAuthStateChanged(auth, async (user) => {
    if (user) {
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists()) {
            const role = userDoc.data().role;
            window.location.href = role === "admin" ? "admin-html" : "dashboard-html";
        }
    }
});

function generateReferralCode() {
    return Math.random().toString(36).substring(2, 8).toUpperCase();
}

// REGISTER
window.handleRegister = async () => {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const referralCode = document.getElementById('regReferral').value.trim();
    const msgEl = document.getElementById('regMessage');

    if (!name || !email || !password) {
        msgEl.innerText = "Fill all fields";
        return;
    }

    try {
        msgEl.innerText = "Creating account...";

        // ✅ AUTH FIRST
        const userCred = await createUserWithEmailAndPassword(auth, email, password);
        const uid = userCred.user.uid;

        await updateProfile(userCred.user, { displayName: name });

        const newReferralCode = generateReferralCode();

        // ✅ THEN FIRESTORE
        await setDoc(doc(db, "users", uid), {
            email,
            displayName: name,
            createdAt: serverTimestamp(),
            referralCode: newReferralCode,
            referredBy: referralCode || null,
            kycStatus: "unverified",
            isSuspended: false,
            isFrozen: false,
            role: "user",
            totalEarned: 20,
            withdrawableBalance: 20,
            totalWithdrawn: 0
        });

        await setDoc(doc(db, "wallets", uid), {
            investedBalance: 0,
            bonusBalance: 20,
            totalDeposited: 0,
            lastUpdated: serverTimestamp()
        });

        await setDoc(doc(db, "login_streaks", uid), {
            currentStreak: 1,
            longestStreak: 1,
            lastLoginDate: new Date().toISOString().split('T')[0],
            bonusClaimedToday: true
        });

        // Referral logic
        if (referralCode) {
            const q = query(collection(db, "users"), where("referralCode", "==", referralCode));
            const qSnap = await getDocs(q);
            if (!qSnap.empty) {
                await addDoc(collection(db, "referrals"), {
                    referrerId: qSnap.docs[0].id,
                    referredId: uid,
                    commissionEarned: 0,
                    status: "pending",
                    commissionRate: 10,
                    createdAt: serverTimestamp()
                });
            }
        }

        msgEl.innerText = "Success! Redirecting...";
        setTimeout(() => {
            window.location.href = "dashboard-html";
        }, 1500);

    } catch (err) {
        msgEl.innerText = err.message;
    }
};

// LOGIN
window.handleLogin = async () => {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    const userCred = await signInWithEmailAndPassword(auth, email, password);
    const userDoc = await getDoc(doc(db, "users", userCred.user.uid));

    const role = userDoc.data().role;
    window.location.href = role === "admin" ? "admin-html" : "dashboard-html";
};

// 👉 CHANGE: redirect instead of scroll
window.goToRegisterPage = () => {
    window.location.href = "register.html";
};
</script>
</head>

<body class="bg-gray-50">

<!-- HERO -->
<div class="bg-blue-900 text-white text-center py-20">
    <h1 class="text-5xl font-bold mb-6">BestPay</h1>
    <p class="mb-6">Earn. Invest. Grow.</p>

    <!-- ✅ UPDATED BUTTON -->
    <button onclick="goToRegisterPage()" 
        class="bg-yellow-400 text-black px-6 py-3 rounded-lg font-bold">
        Get Started
    </button>
</div>

<!-- REGISTER PAGE CONTENT -->
<div class="max-w-md mx-auto mt-10 bg-white p-6 rounded-lg shadow">

    <h2 class="text-xl font-bold mb-4">Register</h2>

    <input id="regName" placeholder="Full Name" class="w-full mb-2 p-2 border">
    <input id="regEmail" placeholder="Email" class="w-full mb-2 p-2 border">
    <input id="regPassword" type="password" placeholder="Password" class="w-full mb-2 p-2 border">
    <input id="regReferral" placeholder="Referral Code" class="w-full mb-2 p-2 border">

    <button onclick="handleRegister()" class="bg-green-500 text-white w-full py-2">
        Register
    </button>

    <p id="regMessage" class="text-red-500 mt-2"></p>

</div>

</body>
</html>
